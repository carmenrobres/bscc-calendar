name: Update Data

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write data.json
        run: |
          echo '${{ toJson(github.event.client_payload.data) }}' > data.json

      - name: Commit and push
        run: |
          git config user.name "BSC Calendar Bot"
          git config user.email "bot@bsc.es"
          git add data.json
          git diff --staged --quiet || git commit -m "Actualizar datos [skip ci]"
          git push
