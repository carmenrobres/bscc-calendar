name: Update Data

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_TOKEN }}

      - name: Write data.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = context.payload.client_payload.data;
            fs.writeFileSync('data.json', JSON.stringify(data, null, 2), 'utf8');
            console.log('data.json written with', data.rows ? data.rows.length : 0, 'rows');

      - name: Commit and push
        run: |
          git config user.name "BSC Calendar Bot"
          git config user.email "bot@bsc.es"
          git add data.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "Actualizar datos" && git push)
